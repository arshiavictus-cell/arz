// ابزار دریافت و پارس کردن زنده قیمت‌های واقعی بازار ایران از ویجت زنده نوسان
// این روش نیازی به کلید ندارد و ۱۰۰٪ زنده و آپدیت است (قیمت‌های واقعی بازار تهران)

export type LiveRates = {
  usd: number; // دلار آزاد
  eur: number; // یورو
  gbp: number; // پوند
  afn: number; // افغانی
  ayar18: number; // طلای ۱۸ عیار
  sekkeh: number; // سکه امامی
  bahar: number; // سکه بهار آزادی
  nim: number; // نیم سکه
  rob: number; // ربع سکه
  mesghal: number; // مثقال طلا
  gerami: number; // سکه گرمی
  updatedTime: string;
};

// تبدیل اعداد فارسی به انگلیسی
export function faToEn(str: string): string {
  const faNums = ["۰", "۱", "۲", "۳", "۴", "۵", "۶", "۷", "۸", "۹"];
  const arNums = ["٠", "١", "٢", "٣", "٤", "٥", "٦", "٧", "٨", "٩"];
  let res = str;
  for (let i = 0; i < 10; i++) {
    res = res.replace(new RegExp(faNums[i], "g"), i.toString());
    res = res.replace(new RegExp(arNums[i], "g"), i.toString());
  }
  return res;
}

// پارس کردن مقدار عددی از متن (حذف کاما و فاصله‌ها و تبدیل حروف فارسی)
export function parsePrice(text: string): number {
  const clean = faToEn(text).replace(/,/g, "").trim();
  const num = parseFloat(clean);
  return isNaN(num) ? 0 : num;
}

export function fetchLiveNavasan(): Promise<LiveRates> {
  return new Promise((resolve, reject) => {
    // ایجاد نام یکتای تابع Callback
    const callbackName = "navasan_callback_" + Math.round(Math.random() * 1000000);

    // تعریف تابع سراسری برای دریافت اطلاعات
    (window as any)[callbackName] = (htmlContent: string) => {
      try {
        // تمیزکاری سراسری
        delete (window as any)[callbackName];
        const scriptTag = document.getElementById(callbackName);
        if (scriptTag) scriptTag.remove();

        // پارس کردن HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, "text/html");

        const getVal = (id: string): number => {
          const row = doc.getElementById(id);
          if (!row) return 0;
          const valTd = row.querySelector(".val");
          return valTd ? parsePrice(valTd.textContent || "") : 0;
        };

        const getTime = (id: string): string => {
          const row = doc.getElementById(id);
          if (!row) return "";
          const datTd = row.querySelector(".dat");
          return datTd ? faToEn(datTd.textContent || "").trim() : "";
        };

        const rates: LiveRates = {
          usd: getVal("usd"),
          eur: getVal("eur"),
          gbp: getVal("gbp"),
          afn: getVal("afn"),
          ayar18: getVal("18ayar"),
          sekkeh: getVal("sekkeh"),
          bahar: getVal("bahar"),
          nim: getVal("nim"),
          rob: getVal("rob"),
          mesghal: getVal("abshodeh"),
          gerami: getVal("gerami"),
          updatedTime: getTime("usd") || getTime("18ayar") || "لحظه‌ای",
        };

        resolve(rates);
      } catch (err) {
        reject(err);
      }
    };

    // اضافه کردن اسکریپت به سند
    const script = document.createElement("script");
    script.id = callbackName;
    // لینک مستقیم ویجت نوسان با ارجاع به Callback ما
    script.src = `https://www.navasan.tech/wp-navasan.php?usd&eur&gbp&afn&sekkeh&bahar&nim&rob&18ayar&abshodeh&gerami&callback=${callbackName}`;
    
    // حل مشکل عدم لود یا خطای شبکه
    script.onerror = () => {
      delete (window as any)[callbackName];
      script.remove();
      reject(new Error("خطا در لود اسکریپت نوسان"));
    };

    // چون اسکریپت نوسان خروجی را به صورت `navasanret('...')` صدا می‌زند، ما باید موقتاً `navasanret` را به تابع خودمان نگاشت کنیم.
    (window as any)["navasanret"] = (data: string) => {
      if ((window as any)[callbackName]) {
        (window as any)[callbackName](data);
      }
    };

    document.body.appendChild(script);
  });
}
